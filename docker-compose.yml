services:

  php:
    build:
      context: ./docker/php
    container_name: rental_bike_php
    volumes:
      - .:/var/www
    networks:
      - rental_network


  nginx:
    image: nginx:latest
    container_name: rental_bike_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - rental_network


  mysql:
    image: mysql:8.4
    container_name: rental_bike_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rental_bike
      MYSQL_USER: rental_user
      MYSQL_PASSWORD: rental_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rental_network


  phpmyadmin:
    image: phpmyadmin:latest
    container_name: rental_bike_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: rental_user
      PMA_PASSWORD: rental_password
    depends_on:
      - mysql
    networks:
      - rental_network


volumes:

  mysql_data:


networks:

  rental_network: