services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rental_bike_php
    volumes:
      - .:/var/www
    networks:
      - rental_network

  nginx:
    image: nginx:latest
    container_name: rental_bike_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - rental_network

  mysql:
    image: mysql:8.4
    container_name: rental_bike_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rental_bike
      MYSQL_USER: rental_user
      MYSQL_PASSWORD: rental_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rental_network


networks:
  rental_network:


volumes:
  mysql_data: